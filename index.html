<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso - VIDAFEM</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <img src="assets/logo2.png" alt="VIDAFEM Intro" class="splash-logo">
    </div>

    <main class="login-wrapper">
        
        <div class="form-side">
            <div class="login-header">
                <h2>Bienvenida</h2>
                <img src="assets/logo.png" alt="Logo VIDAFEM" class="form-logo">
                <div class="visual-copy" style="margin-bottom: 25px;">
                    <p>Especialistas en salud femenina y familiar.</p>
                    <p>Ofrecemos diagnóstico, prevención y tratamiento con altos estándares de calidad y cuidado humano.</p>
                    
                </div>
                <h1 style="font-size: 1.3rem; margin-bottom: 0;">Inicia sesión.</h1>
                <p style="color:#ddd; margin-top: -5px; margin-bottom: 10px; line-height: 1;">__________________________________</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" id="usuario" placeholder="Usuario o Cédula" required>
                </div>

                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>

                <!-- <div class="actions"> 
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div> -->

                <button type="submit" class="btn-login" id="btnLogin">
                    INGRESAR
                </button>
                
                <p id="mensajeEstado" class="status-message"></p>
            </form>
            
            <div class="login-footer">
               <p>¿Aún no tienes cuenta? Solicítala en consulta.</p>
                <a href="https://wa.me/593997330933?text=Hola%20VIDAFEM%20deseo%20ser%20usuario..." target="_blank" class="btn-whatsapp-minimal">
                    <i class="fab fa-whatsapp"></i> Contactar soporte
                </a>
            </div>
            
            <div class="app-version">VIDAFEM v1.3 EACV</div>
        </div>
    </main>

    <script src="js/notify.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Lógica dely Splash Screen
        window.addEventListener('load', () => {
            const splash = document.getElementById('splashScreen');
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => { splash.style.display = 'none'; }, 800);
            }, 1500);
        });

        // Lógica para VER / OCULTAR contraseña (NUEVO)
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            // Cambiar el tipo de input: de 'password' a 'text' y viceversa
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiar el icono del ojo (abierto/cerrado)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
